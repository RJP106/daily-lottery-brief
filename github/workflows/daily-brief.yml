name: Daily Lottery News Brief
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
jobs:
  send-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - name: Run lottery brief
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/lottery_brief.py
- name: Run lottery brief
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          echo "Password length: ${#GMAIL_APP_PASSWORD}"
          python scripts/lottery_brief.py
