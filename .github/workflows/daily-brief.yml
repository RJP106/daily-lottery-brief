name: Daily Lottery News Brief

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  send-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      env:
          GMAIL_APP_PASSWORD: ${{ secrets.APPPASSWORD }}
        run: python scripts/lottery_brief.py
